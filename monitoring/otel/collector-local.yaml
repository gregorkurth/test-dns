extensions:
  health_check: {}
  file_storage/queue:
    directory: /var/lib/otel/queue
    timeout: 10s
    compaction:
      on_start: true
      on_rebound: true
      rebound_needed_threshold_mib: 100
      rebound_trigger_threshold_mib: 20

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 512
  resource/common:
    attributes:
      - key: deployment.mode
        value: local
        action: upsert
      - key: telemetry.routing
        value: spool-only
        action: upsert

exporters:
  debug:
    verbosity: normal
  file/spool:
    path: /var/lib/otel/spool/telemetry.jsonl
    rotation:
      max_megabytes: 100
      max_days: 3
      max_backups: 10
    format: json

service:
  extensions: [health_check, file_storage/queue]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/common, batch]
      exporters: [debug, file/spool]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/common, batch]
      exporters: [debug, file/spool]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/common, batch]
      exporters: [debug, file/spool]
