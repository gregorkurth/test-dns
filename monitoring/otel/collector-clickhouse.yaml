extensions:
  health_check: {}
  file_storage/queue:
    directory: /var/lib/otel/queue
    timeout: 10s
    compaction:
      on_start: true
      on_rebound: true
      rebound_needed_threshold_mib: 200
      rebound_trigger_threshold_mib: 40

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog/replay:
    include:
      - /var/lib/otel/spool/*.jsonl
    start_at: beginning
    operators:
      - type: json_parser
        parse_from: body

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 5s
    send_batch_size: 512
  resource/clickhouse:
    attributes:
      - key: deployment.mode
        value: clickhouse
        action: upsert
      - key: observability.backend
        value: clickhouse
        action: upsert
  filter/security_events:
    error_mode: ignore
    logs:
      log_record:
        - attributes["event.domain"] == "security"

exporters:
  clickhouse/default:
    endpoint: tcp://clickhouse.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4
    database: otel
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    ttl_days: 7
    timeout: 10s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000
      storage: file_storage/queue
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
  clickhouse/siem:
    endpoint: tcp://clickhouse.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4
    database: otel
    logs_table_name: otel_security_events
    timeout: 10s
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 4000
      storage: file_storage/queue
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 10m
  debug:
    verbosity: basic

service:
  extensions: [health_check, file_storage/queue]
  pipelines:
    logs/default:
      receivers: [otlp, filelog/replay]
      processors: [memory_limiter, resource/clickhouse, batch]
      exporters: [clickhouse/default, debug]
    logs/security:
      receivers: [otlp, filelog/replay]
      processors: [memory_limiter, resource/clickhouse, filter/security_events, batch]
      exporters: [clickhouse/siem]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/clickhouse, batch]
      exporters: [clickhouse/default, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/clickhouse, batch]
      exporters: [clickhouse/default, debug]
