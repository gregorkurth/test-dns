apiVersion: 1

datasources:
  - name: ClickHouse OTel
    uid: clickhouse-otel
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      defaultDatabase: otel
      host: clickhouse.monitoring.svc.cluster.local
      port: 9000
      protocol: native
      secure: false
      username: grafana_readonly
      tlsSkipVerify: false
      logs:
        defaultDatabase: otel
        defaultTable: otel_logs
        otelEnabled: true
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: otel
        defaultTable: otel_traces
        otelEnabled: true
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        operationNameColumn: SpanName
        serviceNameColumn: ServiceName
        durationTimeColumn: Duration
        startTimeColumn: Timestamp
    secureJsonData:
      password: "__SET_IN_TARGET_ENV__"
