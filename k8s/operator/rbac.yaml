apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-operator-controller-manager
  namespace: dns-config-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dns-operator-manager-role
rules:
  - apiGroups:
      - dns.fmn.mil
    resources:
      - dnsconfigurations
      - dnsconfigurations/finalizers
      - dnsconfigurations/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dns-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dns-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: dns-operator-controller-manager
    namespace: dns-config-system
