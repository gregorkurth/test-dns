apiVersion: v1
kind: ServiceAccount
metadata:
  name: dns-test-operator-controller
  namespace: dns-config-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dns-test-operator-role
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dns-test-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dns-test-operator-role
subjects:
  - kind: ServiceAccount
    name: dns-test-operator-controller
    namespace: dns-config-system
