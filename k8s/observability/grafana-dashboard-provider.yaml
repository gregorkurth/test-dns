apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dns-observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: dns-observability
        orgId: 1
        folder: DNS
        type: file
        disableDeletion: false
        editable: false
        options:
          path: /var/lib/grafana-dashboards
