apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Cilium-Netzwerkrichtlinien (Default-Deny + Allow-Required-Traffic).
# Nur in Clustern mit Cilium CNI einbinden (z.B. internes Overlay).
# Das lokale Docker-Desktop-Overlay schliesst diese Komponente bewusst aus.
resources:
  - ../../base/cilium-default-deny.yaml
  - ../../base/cilium-allow-required-traffic.yaml
