namespace:
  name: dns-management

ingress:
  enabled: true
  className: internal-nginx
  hostname: dns.internal.example.mil
  tls:
    enabled: false
    secretName: ""
  annotations:
    kubernetes.io/ingress.class: internal-nginx
    security.fmn.dev/opa-note: OPA should require an approved hostname, ingress class, and TLS policy for this route.

service:
  type: ClusterIP
  nodePort: null

config:
  APP_BASE_URL: https://dns.internal.example.mil
  LOG_LEVEL: info

otel:
  mode: clickhouse

debug:
  enabled: false

testOperator:
  telemetry:
    mode: clickhouse
