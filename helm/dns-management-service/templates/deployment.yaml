apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dns-management-service.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
{{ include "dns-management-service.labels" . | indent 4 }}
    app.kubernetes.io/component: web
  annotations:
    security.fmn.dev/mtls-required: "true"
    security.fmn.dev/mtls-profile: "cilium-auth-spiffe"
    security.fmn.dev/opa-note: "OPA should reject containers that are privileged, mutable, or not pinned to an approved image source."
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dns-management-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
{{ include "dns-management-service.labels" . | indent 8 }}
        app.kubernetes.io/component: web
        security.fmn.dev/mtls-required: "true"
        observability.fmn.dev/hubble-visible: "true"
        observability.fmn.dev/tetragon-profile: default
        policy.openpolicyagent.org/profile: restricted
      annotations:
{{ toYaml .Values.podAnnotations | indent 8 }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
{{ toYaml .Values.securityContext.pod | indent 8 }}
      containers:
        - name: app
          image: {{ include "dns-management-service.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "dns-management-service.fullname" . }}-config
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          securityContext:
{{ toYaml .Values.securityContext.container | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
