namespace:
  name: dns-management-local

replicaCount: 1

image:
  repository: test-dns
  tag: dev
  digest: ""
  pullPolicy: Never

ingress:
  enabled: true
  className: nginx
  hostname: dns.localtest.me
  tls:
    enabled: false
    secretName: ""
  annotations:
    kubernetes.io/ingress.class: nginx
    security.fmn.dev/opa-note: OPA should require an approved hostname, ingress class, and TLS policy for this route.

service:
  type: NodePort
  nodePort: 30080

config:
  APP_BASE_URL: https://dns.localtest.me
  LOG_LEVEL: debug

otel:
  mode: local

debug:
  enabled: true

testOperator:
  telemetry:
    mode: local
