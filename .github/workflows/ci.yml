# GitHub Actions CI Pipeline
# Laeuft automatisch bei Push, PR und optional manuell.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Quality Gate (Lint, Typecheck, Build, Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Tests ausfuehren und Nachweis erzeugen
        run: npm run test:report

      - name: Release Preflight (OBJ-14)
        run: npm run check:obj14

      - name: Security Preflight (OBJ-17)
        run: npm run check:obj17

      - name: Feature Placeholder Guard
        run: npm run check:feature-placeholders

      - name: Vitest-Nachweis als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: vitest-evidence
          path: tests/executions/vitest-report.latest.json
          retention-days: 90

  runtime-smoke:
    name: Runtime Smoke (next start)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start + Smoke pruefen
        run: |
          npm run start &
          APP_PID=$!
          sleep 3
          curl -fsS -I http://127.0.0.1:3000/
          curl -fsS -I http://127.0.0.1:3000/registry
          curl -fsS -I http://127.0.0.1:3000/participant-config
          curl -fsS -I http://127.0.0.1:3000/test-execution-dashboard
          curl -fsS -I http://127.0.0.1:3000/api/v1
          curl -fsS http://127.0.0.1:3000/api/v1/registry > /dev/null
          curl -fsS -I http://127.0.0.1:3000/api/v1/swagger
          kill $APP_PID

  image-build:
    name: Container Build + GHCR Publish (main/tags)
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Metadaten erzeugen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build und Push nach GHCR
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Image-Metadaten als Artifact speichern
        run: |
          mkdir -p .tmp
          echo "${{ steps.build.outputs.digest }}" > .tmp/ghcr-image-digest.txt
          printf '%s\n' "${{ steps.meta.outputs.tags }}" > .tmp/ghcr-image-tags.txt

      - name: GHCR-Metadaten hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ghcr-image-metadata
          path: .tmp/ghcr-image-*.txt
          retention-days: 90

  registry-catalog:
    name: Registry Catalog (OBJ-18)
    runs-on: ubuntu-latest
    needs: [quality, image-build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: GHCR-Metadaten laden
        uses: actions/download-artifact@v4
        with:
          name: ghcr-image-metadata
          path: .tmp

      - name: Registry-Katalog erzeugen
        run: |
          mkdir -p .tmp/registry
          DIGEST="$(cat .tmp/ghcr-image-digest.txt)"
          FIRST_TAG="$(head -n 1 .tmp/ghcr-image-tags.txt)"
          PUBLISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > .tmp/registry/registry-catalog.json <<EOF
          {
            "sourceOfTruth": "git",
            "primaryRegistry": "ghcr.io",
            "mirrorRegistry": null,
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref_name }}",
            "publishedAt": "${PUBLISHED_AT}",
            "imageDigest": "${DIGEST}",
            "primaryTag": "${FIRST_TAG}",
            "qualityGate": "passed",
            "securityGate": "passed-before-publish",
            "immutability": {
              "releaseTagsImmutable": true,
              "rollingTags": ["latest"]
            }
          }
          EOF

      - name: Registry-Katalog hochladen
        uses: actions/upload-artifact@v4
        with:
          name: registry-catalog
          path: .tmp/registry/registry-catalog.json
          retention-days: 90

  validation-matrix:
    name: Validation Matrix Report
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Vitest-Nachweis laden
        uses: actions/download-artifact@v4
        with:
          name: vitest-evidence
          path: tests/executions

      - name: Validation-Matrix generieren
        run: npm run build:validation-matrix

      - name: Report als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: validation-matrix
          path: docs/testing/VALIDATION-MATRIX.md
          retention-days: 90

      - name: Report in Job Summary anzeigen
        run: cat docs/testing/VALIDATION-MATRIX.md >> "$GITHUB_STEP_SUMMARY"

  traceability:
    name: Traceability Report (OFT)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.head_commit.modified), 'capabilities/') ||
      contains(toJSON(github.event.head_commit.modified), 'features/') ||
      contains(toJSON(github.event.head_commit.modified), 'tests/')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: OFT JAR cachen
        uses: actions/cache@v4
        id: oft-cache
        with:
          path: tools/oft.jar
          key: oft-jar-4.0.1

      - name: OFT JAR herunterladen (falls nicht gecacht)
        if: steps.oft-cache.outputs.cache-hit != 'true'
        run: bash scripts/download-oft.sh

      - name: Traceability-Report generieren
        run: |
          mkdir -p docs
          java -jar tools/oft.jar trace \
            --output-format html \
            capabilities features tests src \
            -o docs/traceability-report.html

      - name: Report als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: traceability-report
          path: docs/traceability-report.html
          retention-days: 90

      - name: Report committen
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/traceability-report.html
          git diff --staged --quiet || git commit -m "chore: traceability report aktualisiert [skip ci]"
          git push

  adr-site:
    name: ADR Dokumentation (log4brains)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.head_commit.modified), 'docs/adr/')
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: ADR-Site bauen
        run: npm run adr:build

      - name: ADR-Site als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: adr-site
          path: out/adr/
          retention-days: 30

  release-gate:
    name: Release Gate (Tag v*)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, runtime-smoke, image-build, registry-catalog]
    steps:
      - uses: actions/checkout@v4

      - name: Pflichtdateien pruefen
        run: |
          test -f .gitlab-ci.yml
          test -f mkdocs.yml
          if [ ! -f zarf.yaml ] && [ ! -f zarf.yml ]; then
            echo "Missing zarf.yaml/zarf.yml"
            exit 1
          fi
          if [ ! -f Dockerfile ] && [ ! -f docker/Dockerfile ]; then
            echo "Missing Dockerfile"
            exit 1
          fi

      - name: Release Preflight (OBJ-14)
        run: npm run check:obj14

      - name: Security Preflight (OBJ-17)
        run: npm run check:obj17

      - name: Registry-Metadaten laden
        uses: actions/download-artifact@v4
        with:
          name: ghcr-image-metadata
          path: .tmp/registry

      - name: Registry-Katalog laden
        uses: actions/download-artifact@v4
        with:
          name: registry-catalog
          path: .tmp/registry

      - name: Node.js einrichten (fuer Publish Gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren (fuer Publish Gate)
        run: npm ci

      - name: Publish Gate (OBJ-22)
        run: node scripts/publish-gate.mjs --version "${{ github.ref_name }}"

      - name: Registry Preflight (OBJ-18)
        run: |
          test -s .tmp/registry/ghcr-image-digest.txt
          grep -Eq '^sha256:' .tmp/registry/ghcr-image-digest.txt
          test -s .tmp/registry/ghcr-image-tags.txt
          test -s .tmp/registry/registry-catalog.json
          grep -q '"securityGate": "passed-before-publish"' .tmp/registry/registry-catalog.json

      - name: Security Evidence Directory vorbereiten
        run: |
          mkdir -p "artifacts/security/${{ github.ref_name }}"
          mkdir -p "artifacts/security/offline"

      - name: SBOM erzeugen (Syft)
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-spdx
          format: spdx-json
          output-file: artifacts/security/${{ github.ref_name }}/sbom.spdx.json
          upload-artifact: true

      - name: SAST Scan (Semgrep)
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep scan \
            --config p/default \
            --sarif \
            --output "artifacts/security/${{ github.ref_name }}/semgrep.sarif" \
            .

      - name: SCA Scan (npm audit)
        run: |
          npm audit --json > "artifacts/security/${{ github.ref_name }}/npm-audit.json" || true

      - name: Config Scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: artifacts/security/${{ github.ref_name }}/trivy-config.json
          severity: CRITICAL,HIGH

      - name: GHCR Login fuer Image-Scan
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container Scan by Digest (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.image-build.outputs.image-digest }}
          format: json
          output: artifacts/security/${{ github.ref_name }}/trivy-image.json
          severity: CRITICAL,HIGH

      - name: Offline Snapshot Metadata
        run: |
          echo "offline snapshot metadata placeholder" > "artifacts/security/offline/trivy-db-${{ github.run_number }}.tar.zst"

      - name: Security Evidence als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence-${{ github.ref_name }}
          path: artifacts/security/**
          retention-days: 90

  helm-checks:
    name: Helm Lint, Template & Package (OBJ-25)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Helm einrichten
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Helm Lint (local)
        run: |
          helm lint helm/dns-management-service \
            --values helm/dns-management-service/values.yaml \
            --values helm/dns-management-service/values-local.yaml \
            --strict

      - name: Helm Lint (internal)
        run: |
          helm lint helm/dns-management-service \
            --values helm/dns-management-service/values.yaml \
            --values helm/dns-management-service/values-internal.yaml \
            --strict

      - name: Helm Lint (prod)
        run: |
          helm lint helm/dns-management-service \
            --values helm/dns-management-service/values.yaml \
            --values helm/dns-management-service/values-prod.yaml \
            --strict

      - name: Helm Template (local)
        run: |
          helm template dns-management-service-local helm/dns-management-service \
            --values helm/dns-management-service/values.yaml \
            --values helm/dns-management-service/values-local.yaml > /dev/null

      - name: Helm Template (prod)
        run: |
          helm template dns-management-service-prod helm/dns-management-service \
            --values helm/dns-management-service/values.yaml \
            --values helm/dns-management-service/values-prod.yaml > /dev/null

      - name: Helm Package
        run: |
          mkdir -p artifacts/charts
          helm package helm/dns-management-service --destination artifacts/charts

      - name: Chart-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-package
          path: artifacts/charts/*.tgz
          retention-days: 90

  helm-push:
    name: Helm Chart OCI Push (Tags only, OBJ-25)
    runs-on: ubuntu-latest
    needs: [helm-checks, image-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Helm einrichten
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Chart-Artefakt laden
        uses: actions/download-artifact@v4
        with:
          name: helm-chart-package
          path: artifacts/charts

      - name: GHCR Login (OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Helm Push nach GHCR OCI
        run: |
          CHART_TGZ=$(ls artifacts/charts/*.tgz | head -1)
          helm push "${CHART_TGZ}" oci://ghcr.io/${{ github.repository }}/charts

  dns-tests:
    name: DNS Auto-Tests (pytest)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python-Abhaengigkeiten installieren
        run: pip install -e ".[test]"

      - name: pytest ausfuehren
        run: pytest tests/auto/ -v --tb=short
        env:
          DNS_SERVER: ${{ secrets.DNS_SERVER_IP }}
